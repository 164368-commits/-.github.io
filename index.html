<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ น้องรัด ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:380px;
    background:#fff;
    border-radius:20px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

img{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:15px;
}

h2{
    margin:15px 0;
    color:#ff3366;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ff3366;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#ff1744;
}

#text{
    margin-top:20px;
    display:none;
    color:#e91e63;
    font-size:22px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<img id="slide" src="751035036_1719591268958655_8370233642973154637_n.jpg">

<h2>❤️ น้องรัด ❤️</h2>

<button onclick="startLove()">กดตรงนี้ ❤️</button>

<div id="text">
รักที่สุดเลยนะ ❤️<br>
 🥰
</div>

<audio id="music">
<source src="เพลงรัก Three Man Down Official MV.mp3" type="audio/mpeg">
</audio>

</div>

<script>

const images=[
"752550920_1018062320995628_3834456038027307601_n.jpg",
"754015096_2926203654416033_1176873942568398260_n.jpg",
"753105080_1500194058456130_231933915178450339_n.jpg",
"751134574_1477406654429882_498575148599167075_n.jpg",
"749419435_906666985822657_1804846366889359069_n.jpg"
];

let index=0;

setInterval(function(){
    index++;
    if(index>=images.length){
        index=0;
    }
    document.getElementById("slide").src=images[index];
},3000);

function startLove(){
    document.getElementById("music").play();
    document.getElementById("text").style.display="block";
}

</script>

</body>
</html>
